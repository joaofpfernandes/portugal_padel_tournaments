<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscrições - Padel Portugal</title>
    <script src="../scripts/shared-social-meta.js"></script>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link rel="stylesheet" href="../styles/main.css" />
    <style>
      .t-row {
        display: flex; align-items: center; justify-content: space-between;
        gap: 1rem; background: var(--card-bg); border: 1px solid var(--border);
        border-radius: 10px; padding: 0.75rem 1rem; flex-wrap: wrap;
        margin-bottom: 0.5rem;
      }
      .t-name { font-weight: 600; font-size: 0.9rem; width: 350px; min-width: 350px; }
      .t-meta { font-size: 0.75rem; color: var(--text-light); white-space: nowrap; }
      .t-controls { display: flex; gap: 0.5rem; align-items: flex-end; flex-wrap: wrap; }
      .t-controls label { font-size: 0.75rem; color: var(--text-light); margin-bottom: 0.15rem; }
      .t-controls .t-control-group { display: flex; flex-direction: column; }
      .t-controls select { width: auto; min-width: 140px; font-size: 0.8rem; padding: 0.35rem 2rem 0.35rem 0.6rem; }
      .btn-gen {
        padding: 0.4rem 1rem; border-radius: 8px; border: none;
        background: #1565c0; color: #fff; font-size: 0.8rem; font-weight: 600;
        cursor: pointer; font-family: inherit; white-space: nowrap;
      }
      .btn-gen:hover { background: #0d47a1; }
      .btn-gen:disabled { background: #aaa; cursor: not-allowed; }

      .hint { color:var(--text-light); font-style:italic; font-size:0.85rem; padding:0.5rem 0; }
      .err  { color:#c62828; font-weight:500; padding:0.5rem 0; }
    </style>
  </head>
  <body data-page="inscricoes">
    <div id="sharedHeader"></div>

    <main class="calc-layout" style="max-width:1100px">
      <section class="calc-card">
        <div class="filters-header" style="margin-bottom:1rem">
          <div>
            <div class="filters-title">Inscrições</div>
            <div class="filters-hint" style="margin:0.25rem 0 0">
              Escolhe um torneio, a secção e o tamanho do quadro para ver a lista de entrada.
            </div>
          </div>
        </div>

        <div id="tournamentList"><p class="hint">A carregar torneios...</p></div>
      </section>
    </main>

    <script src="../scripts/shared-header.js"></script>
    <script src="../scripts/shared-theme.js"></script>
    <script src="../data/tournaments.js"></script>
    <script src="../scripts/inscricoes.js"></script>
  </body>
</html>
