name: Generate Draws

on:
  schedule:
    - cron: '0 9 * * *'   # 9am UTC
    - cron: '0 21 * * *'  # 9pm UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts/draw

      - name: Generate draws
        run: node scripts/draw/run-all.js

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/draws/
          git diff --cached --quiet || git commit -m "chore: update draws [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
